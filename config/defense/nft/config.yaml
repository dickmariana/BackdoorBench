device: 'cuda'
amp: False
pin_memory: True
non_blocking: True
prefetch: False

checkpoint_load:
checkpoint_save:
log:
dataset_path: './data'
dataset: 'cifar10'

model: 'preactresnet18'
random_seed: 0

nb_epochs: 20000        # total gradient steps; outer passes = ceil(nb_epochs/epoch_aggregation) = 100, as in the paper
epoch_aggregation: 200
batch_size: 128
num_workers: 4
lr: 0.05
sgd_momentum: 0.95
eta_min: 0.02

ratio: 0.05 #for fair (official code uses 0.01)
index:

mixup_alpha: 1.0
eta_c: 0.001
mask_alpha: 0.8
mask_beta: 0.5
